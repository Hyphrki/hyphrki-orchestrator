name: hyphrki-orchestrator
# Updated for deployment
region: nyc
services:
  - name: orchestrator
    github:
      repo: Hyphrki/hyphrki-orchestrator
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 5678
    instance_count: 1
    instance_size_slug: professional-xs
    
    envs:
      - key: NODE_ENV
        value: "production"
      - key: N8N_PORT
        value: "5678"
      - key: N8N_HOST
        value: "0.0.0.0"
      - key: N8N_PROTOCOL
        value: "https"
      - key: DB_TYPE
        value: "postgresdb"
      - key: DB_POSTGRESDB_SCHEMA
        value: "n8n"
      - key: EXECUTIONS_PROCESS
        value: "main"
      - key: N8N_DIAGNOSTICS_ENABLED
        value: "false"
      - key: N8N_VERSION_NOTIFICATIONS_ENABLED
        value: "false"
      - key: N8N_PERSONALIZATION_ENABLED
        value: "false"
      - key: N8N_HIRING_BANNER_ENABLED
        value: "false"
      - key: N8N_TEMPLATES_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: "info"
      
      # Database (from environment - configure in DigitalOcean console)
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_POSTGRESDB_HOST
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_POSTGRESDB_PORT
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_POSTGRESDB_DATABASE
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_POSTGRESDB_USER
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_POSTGRESDB_PASSWORD
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_POSTGRESDB_SSL_ENABLED
        value: "true"

      # JWT & Security
      - key: JWT_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: JWT_REFRESH_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SESSION_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: ENCRYPTION_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: N8N_ENCRYPTION_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET

      # Inter-service
      - key: INTER_SERVER_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET

      # Redis
      - key: REDIS_HOST
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      
      # Application URLs
      - key: NEXT_PUBLIC_ORCHESTRATOR_URL
        value: "https://admin.hyphrki.com"
      - key: NEXT_PUBLIC_APP_URL
        value: "https://hyphrki.com"
      
      # CORS
      - key: CORS_ORIGIN
        value: "https://hyphrki.com,https://admin.hyphrki.com"

    health_check:
      http_path: /healthz
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    routes:
      - path: /

domains:
  - domain: admin.hyphrki.com
    type: PRIMARY

