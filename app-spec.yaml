name: hyphrki-orchestrator
# Updated for deployment
region: nyc
services:
  - name: orchestrator
    github:
      repo: Hyphrki/hyphrki-orchestrator
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 5678
    instance_count: 1
    instance_size_slug: professional-xs
    
    envs:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "5678"
      - key: N8N_PORT
        value: "8081"
      - key: N8N_HOST
        value: "0.0.0.0"
      - key: LOG_LEVEL
        value: "info"
      
      # Database (from environment)
      - key: DATABASE_URL
        value: "${DATABASE_URL}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_NAME
        value: "${DB_NAME}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_HOST
        value: "${DB_HOST}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_PORT
        value: "${DB_PORT}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_USER
        value: "${DB_USER}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_PASSWORD
        value: "${DB_PASSWORD}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET

      # JWT & Security
      - key: JWT_SECRET
        value: "${JWT_SECRET}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: JWT_REFRESH_SECRET
        value: "${JWT_REFRESH_SECRET}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SESSION_SECRET
        value: "${SESSION_SECRET}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: ENCRYPTION_KEY
        value: "${ENCRYPTION_KEY}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: N8N_ENCRYPTION_KEY
        value: "${N8N_ENCRYPTION_KEY}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET

      # Inter-service
      - key: INTER_SERVER_API_KEY
        value: "${INTER_SERVER_API_KEY}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET

      # Redis
      - key: REDIS_HOST
        value: "${REDIS_HOST}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        value: "${REDIS_PASSWORD}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      
      # Application URLs
      - key: NEXT_PUBLIC_ORCHESTRATOR_URL
        value: "https://admin.hyphrki.com"
      - key: NEXT_PUBLIC_APP_URL
        value: "https://hyphrki.com"
      
      # CORS
      - key: CORS_ORIGIN
        value: "https://hyphrki.com,https://admin.hyphrki.com"

    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    routes:
      - path: /

domains:
  - domain: admin.hyphrki.com
    type: PRIMARY

